<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RayonScan Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;--text:#1a1a18;--text2:#6b6a64;--text3:#9c9b95;--border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);--info-bg:#e6f1fb;--info-text:#185fa5;--warn-bg:#faeeda;--warn-text:#854f0b;--danger-bg:#fcebeb;--danger-text:#a32d2d;--success-bg:#eaf3de;--success-text:#3b6d11;--accent:#1D9E75;--radius:10px;--radius-lg:14px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe9;--text2:#9c9b95;--text3:#6b6a64;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--info-bg:#0c2d4a;--info-text:#85b7eb;--warn-bg:#3d2a08;--warn-text:#fac775;--danger-bg:#3a1010;--danger-text:#f09595;--success-bg:#172b08;--success-text:#97c459}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.shell{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1;padding:0 16px 100px}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;gap:10px;padding:16px 0 14px;border-bottom:0.5px solid var(--border);margin-bottom:18px;position:sticky;top:0;background:var(--bg);z-index:10}
.topbar h1{font-size:18px;font-weight:500;flex:1}
.topbar h2{font-size:17px;font-weight:500;flex:1}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;padding:2px 8px 2px 0;display:flex;align-items:center}
.logo-badge{width:32px;height:32px;border-radius:8px;background:#1a1a18;display:flex;align-items:center;justify-content:center;color:white;font-size:16px}
.tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px}
.tab4{flex:1;padding:8px 2px;font-size:12px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--text2);font-family:inherit;transition:all 0.15s}
.tab4.active{background:#1a1a18;color:white}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0 14px;margin-bottom:12px}
.card-inner{padding:14px}
.btn{width:100%;padding:12px;font-size:15px;font-weight:500;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s;margin-bottom:10px}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#1a1a18;color:white;border-color:transparent}
.btn-primary:hover{background:#2c2c2a}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:transparent}
.btn-sm{width:auto;padding:7px 14px;font-size:13px;margin-bottom:0}
.form-group{margin-bottom:14px}
.form-group label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px}
input[type=text],input[type=number],select,textarea{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,158,117,0.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:18px 0 10px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.empty i{font-size:36px;display:block;margin-bottom:10px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.product-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.product-row:last-child{border-bottom:none}
.product-info{flex:1;min-width:0}
.product-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-sub{font-size:12px;color:var(--text2);margin-top:1px}
.product-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px 6px;border-radius:6px;display:flex;align-items:center;transition:all 0.15s}
.icon-btn:hover{color:var(--text);background:var(--bg2)}
.icon-btn.danger:hover{color:var(--danger-text);background:var(--danger-bg)}
.releve-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.releve-icon{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);flex-shrink:0}
.releve-info{flex:1;min-width:0;cursor:pointer}
.releve-name{font-size:14px;font-weight:500}
.releve-sub{font-size:12px;color:var(--text2);margin-top:2px}
.releve-actions{display:flex;gap:2px;flex-shrink:0}
.enseigne-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:14px}
.enseigne-card:hover{border-color:var(--border2)}
.enseigne-avatar{width:48px;height:48px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2);flex-shrink:0}
.enseigne-name{font-size:15px;font-weight:500}
.enseigne-meta{font-size:12px;color:var(--text2);margin-top:3px}
.stacked-bar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin:10px 0 4px}
.stacked-seg{height:100%}
.stacked-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.facing-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.facing-row:last-child{border-bottom:none}
.facing-info{flex:1;min-width:0}
.facing-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.facing-sub{font-size:11px;color:var(--text2)}
.facing-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-btn{width:30px;height:30px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit;transition:all 0.12s}
.ctrl-btn:active{transform:scale(0.92)}
.facing-count{font-size:15px;font-weight:500;min-width:26px;text-align:center}
.facing-ml{font-size:12px;color:var(--text2);min-width:44px;text-align:right}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.metric{background:var(--bg3);border-radius:var(--radius);padding:14px 12px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.result-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-info{flex:1;min-width:0}
.result-name{font-size:13px;font-weight:500}
.result-sub{font-size:11px;color:var(--text2);margin-top:1px}
.bar-wrap{width:70px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:3px}
.result-pct{font-size:13px;font-weight:500;min-width:38px;text-align:right}
.result-ml{font-size:12px;color:var(--text2);min-width:44px;text-align:right}
.badge{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500;display:inline-block;margin-left:6px;vertical-align:middle}
.badge-leader{background:var(--info-bg);color:var(--info-text)}
.badge-low{background:var(--warn-bg);color:var(--warn-text)}
.sticky-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:0.5px solid var(--border);padding:12px 16px 20px;z-index:20}
.photo-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:1.2rem 1rem;text-align:center;cursor:pointer;transition:background 0.15s;margin-bottom:14px}
.photo-zone:hover{background:var(--bg2)}
.photo-zone i{font-size:24px;color:var(--text3);display:block;margin-bottom:5px}
.photo-zone p{font-size:13px;color:var(--text2)}
.photo-zone .hint{font-size:11px;color:var(--text3);margin-top:3px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions button{flex:1}
canvas{display:block;margin:0 auto}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:12px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.sync-dot.syncing{background:var(--warn-text);animation:pulse 1s infinite}
.sync-dot.error{background:var(--danger-text)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.centrale-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);margin:2px}
.centrale-tag.selected{background:#1a1a18;color:white;border-color:#1a1a18}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-family:inherit}
.filter-chip.active{background:#1a1a18;color:white;border-color:#1a1a18}
</style>
</head>
<body>
<div class="shell">

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="topbar" style="background:#1a1a18;border-bottom:none;padding:16px 16px 14px;margin:0 -16px 18px">
    <div class="logo-badge"><i class="ti ti-chart-bar" aria-hidden="true"></i></div>
    <h1 style="color:white">RayonScan <span style="color:#1D9E75">Pro</span></h1>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-bar" id="sync-status" style="color:rgba(255,255,255,0.6)"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">…</span></div>
      <button onclick="doLogout()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6);font-size:18px;padding:4px;display:flex;align-items:center" title="Déconnexion"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  <div class="tabs" id="main-tabs">
    <button class="tab4 active" onclick="switchTab('releves',this)">Relevés</button>
    <button class="tab4" id="tab-btn-equipe" style="display:none" onclick="switchTab('equipe',this)">Équipe</button>
    <button class="tab4" onclick="switchTab('enseignes',this)">Enseignes</button>
    <button class="tab4" onclick="switchTab('catalogue',this)">Catalogue</button>
    <button class="tab4" onclick="switchTab('centrales',this)">Centrales</button>
  </div>
  <div id="tab-releves">
    <button class="btn" onclick="showScreen('screen-new-releve')"><i class="ti ti-plus" aria-hidden="true"></i> Nouveau relevé</button>
    <div id="releve-list"></div>
  </div>
  <div id="tab-equipe" style="display:none">
    <div id="equipe-metrics" class="metric-grid" style="margin-bottom:12px"></div>
    <div class="section-label">Relevés de l'équipe</div>
    <div id="equipe-list"></div>
  </div>
  <div id="tab-enseignes" style="display:none"><div id="enseignes-list"></div></div>
  <div id="tab-catalogue" style="display:none">
    <div class="filter-bar" id="catalogue-filter"></div>
    <button class="btn" onclick="openModal('product')"><i class="ti ti-plus" aria-hidden="true"></i> Ajouter une référence</button>
    <div class="card" id="catalogue-list"></div>
  </div>
  <div id="tab-centrales" style="display:none">
    <button class="btn" onclick="openModal('centrale')"><i class="ti ti-plus" aria-hidden="true"></i> Ajouter une centrale</button>
    <div class="card" id="centrales-list"></div>
  </div>
</div>

<!-- NEW / EDIT RELEVE -->
<div class="screen" id="screen-new-releve">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('screen-home')"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h2 id="releve-form-title">Nouveau relevé</h2>
  </div>
  <div class="card card-inner">
    <div class="form-group"><label>Enseigne *</label>
      <select id="r-enseigne" onchange="updateCentraleOptions()">
        <option value="">-- Choisir --</option>
        <option>Intermarché Super</option><option>Intermarché Hyper</option>
        <option>Carrefour</option><option>Carrefour Market</option>
        <option>Leclerc</option><option>Auchan</option>
        <option>Super U</option><option>Hyper U</option>
      </select>
    </div>
    <div class="form-group"><label>Centrale</label>
      <select id="r-centrale"><option value="">-- Toutes (pas de centrale) --</option></select>
    </div>
    <div class="form-group"><label>Ville / Magasin *</label><input type="text" id="r-magasin" placeholder="ex: Montaren Saint-Médiers"></div>
    <div class="form-row">
      <div class="form-group"><label>Type de rayon</label>
        <select id="r-type"><option>Tomates cerises</option><option>Tomates cocktail</option><option>Fruits & Légumes</option><option>Autre</option></select>
      </div>
      <div class="form-group"><label>Date</label><input type="text" id="r-date"></div>
    </div>
  </div>
  <div class="sticky-bar"><button class="btn btn-primary" id="releve-submit-btn" onclick="startFacings()"><i class="ti ti-arrow-right" aria-hidden="true"></i> Saisir les facings</button></div>
</div>

<!-- FACINGS -->
<div class="screen" id="screen-facings">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('screen-new-releve')"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h2 id="facing-title">Facings</h2>
  </div>
  <div id="photo-gallery" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"></div>
  <div class="photo-zone" id="photo-zone" onclick="document.getElementById('photo-input').click()">
    <i class="ti ti-camera" aria-hidden="true"></i>
    <p id="photo-zone-text">Ajouter une photo</p>
    <p class="hint">Jusqu'à 5 photos · galerie ou appareil photo</p>
  </div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <p style="font-size:13px;color:var(--text2)" id="facing-filter-label">Toutes les références</p>
    <button class="btn btn-sm" onclick="openModal('product-facing')"><i class="ti ti-plus" aria-hidden="true"></i> Réf</button>
  </div>
  <div class="card" id="facing-list"></div>
  <div style="height:90px"></div>
  <div class="sticky-bar" style="display:flex;gap:10px">
    <button class="btn" style="margin-bottom:0" onclick="exportCSV()"><i class="ti ti-table-export" aria-hidden="true"></i> CSV</button>
    <button class="btn btn-primary" style="margin-bottom:0" onclick="calcResults()"><i class="ti ti-calculator" aria-hidden="true"></i> Calculer</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <div class="topbar">
    <button class="back-btn" onclick="goBackFromResults()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h2 id="result-title">Résultats</h2>
    <button class="icon-btn" onclick="editCurrentReleve()" aria-label="Modifier"><i class="ti ti-edit"></i></button>
  </div>
  <div id="result-gallery" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px"></div>
  <div class="metric-grid" id="result-metrics"></div>
  <canvas id="pie-chart" width="200" height="200" style="margin-bottom:18px"></canvas>
  <div class="section-label">Détail par marque</div>
  <div class="card" id="result-list"></div>
  <div style="height:90px"></div>
  <div class="sticky-bar" style="display:flex;gap:10px">
    <button class="btn" style="margin-bottom:0" onclick="exportCSV()"><i class="ti ti-table-export" aria-hidden="true"></i> CSV</button>
    <button class="btn btn-primary" style="margin-bottom:0" onclick="exportPDF()"><i class="ti ti-file-type-pdf" aria-hidden="true"></i> PDF</button>
  </div>
</div>

<!-- ENSEIGNE DETAIL -->
<div class="screen" id="screen-enseigne">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('screen-home')"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h2 id="enseigne-screen-title">Enseigne</h2>
  </div>
  <div class="metric-grid" id="ens-metrics"></div>
  <canvas id="pie-enseigne" width="200" height="200" style="margin-bottom:8px"></canvas>
  <div id="stacked-wrap" style="margin-bottom:18px"></div>
  <div class="section-label">Répartition consolidée</div>
  <div class="card" id="ens-table"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px">
    <span class="section-label" style="margin:0">Relevés inclus</span>
    <button class="btn-sm btn" style="font-size:12px;padding:5px 10px" onclick="toggleReleves()"><i class="ti ti-list" aria-hidden="true"></i> <span id="releves-toggle-label">Afficher</span></button>
  </div>
  <div id="ens-releves" style="display:none"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

    </div>`;
  document.getElementById('login-email').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('login-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-error');
  if(!email||!pwd){err.textContent='Saisir email et mot de passe.';err.style.display='block';return;}
  btn.textContent='Connexion…';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){
    err.textContent=error.message==='Invalid login credentials'?'Email ou mot de passe incorrect.':error.message;
    err.style.display='block';btn.textContent='Se connecter';btn.disabled=false;
  } else {
    currentUser=data.user;
    location.reload();
  }
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;
  location.reload();
}

function setSyncStatus(state,label){
  const dot=document.getElementById('sync-dot');const lbl=document.getElementById('sync-label');
  if(!dot||!lbl)return;
  dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  lbl.textContent=label;
}

async function init(){
  // Vérifie session auth
  const {data:{session}}=await sb.auth.getSession();
  if(!session){showLoginScreen();return;}
  currentUser=session.user;
  // Charge profil
  const profRes=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(profRes.data)currentProfile=profRes.data;
  setSyncStatus('syncing','Chargement…');
  try{
    const [prodRes,relRes]=await Promise.all([sb.from('produits').select('*'),sb.from('releves').select('*')]);
    centrales=JSON.parse(localStorage.getItem('rsp_centrales')||'null')||JSON.parse(JSON.stringify(DEFAULT_CENTRALES));
    if(prodRes.data&&prodRes.data.length>0){products=prodRes.data.map(p=>({...p,longueur:p.longueur||p.largeur||0,centrales:p.centrales||[]}));}
    else{products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));await sb.from('produits').insert(products.map(p=>({id:p.id,marque:p.marque,ref:p.ref,type:p.type,longueur:p.longueur,hauteur:p.hauteur,poids:p.poids,notes:p.notes,centrales:p.centrales||[]})));}
    releves=relRes.data||[];
    setSyncStatus('ok','Synchronisé');
  // Affiche onglet équipe pour directeur et admin
  if(currentProfile&&(currentProfile.role==='directeur'||currentProfile.role==='admin')){
    const btn=document.getElementById('tab-btn-equipe');
    if(btn)btn.style.display='';
  }
  renderHome();initPhotoListener();
  }catch(e){
    setSyncStatus('error','Hors ligne');
    centrales=JSON.parse(localStorage.getItem('rsp_centrales')||'null')||JSON.parse(JSON.stringify(DEFAULT_CENTRALES));
    products=JSON.parse(localStorage.getItem('rsp_products')||'null')||JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    releves=JSON.parse(localStorage.getItem('rsp_releves')||'[]');
    renderHome();
  }
}

function saveLocal(){
  localStorage.setItem('rsp_products',JSON.stringify(products));
  localStorage.setItem('rsp_releves',JSON.stringify(releves));
  localStorage.setItem('rsp_centrales',JSON.stringify(centrales));
}

function switchTab(tab,btn){

function renderEnseignes(){
  const el=document.getElementById('enseignes-list');if(!el)return;
  if(!releves.length){el.innerHTML='<div class="empty"><i class="ti ti-building-store"></i>Aucun relevé disponible.</div>';return;}
  const grouped=groupByEnseigne();
  if(!Object.keys(grouped).length){el.innerHTML='<div class="empty">Aucune enseigne.</div>';return;}
  el.innerHTML=Object.entries(grouped).map(([enseigne,data])=>{
    const{lines,total,nbReleves,nbMagasins}=data;
    const segs=lines.map((l,i)=>`<div class="stacked-seg" style="width:${(l.totalMl/total*100).toFixed(1)}%;background:${COLORS[i%COLORS.length]}"></div>`).join('');
    const leg=lines.slice(0,3).map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>${l.marque} ${(l.totalMl/total*100).toFixed(0)}%</div>`).join('');
    return`<div class="enseigne-card" onclick="showEnseigneDetail('${enseigne}')">
      ${getEnseigneAvatar(enseigne,48)}
      <div style="flex:1;min-width:0">
        <div class="enseigne-name">${enseigne}</div>
        <div class="enseigne-meta">${nbReleves} relevé${nbReleves>1?'s':''} · ${nbMagasins} magasin${nbMagasins>1?'s':''} · ${total.toFixed(2)}m</div>
        <div class="stacked-bar">${segs}</div>
        <div class="stacked-legend">${leg}</div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text3);font-size:18px;flex-shrink:0"></i>
    </div>`;
  }).join('');
}

function groupByEnseigne(){
  const grouped={};
  releves.forEach(r=>{
    const key=r.enseigne.trim();
    if(!grouped[key])grouped[key]={releves:[],magasins:new Set()};
    grouped[key].releves.push(r);grouped[key].magasins.add(r.magasin);
  });
  const result={};
  Object.entries(grouped).forEach(([enseigne,g])=>{
    const mlSum={};
    g.releves.forEach(r=>{(r.results||[]).forEach(l=>{const p=products.find(x=>x.id===l.pid);const marque=p?p.marque:'?';if(!mlSum[marque])mlSum[marque]=0;mlSum[marque]+=l.ml;});});
    const lines=Object.entries(mlSum).map(([marque,totalMl])=>({marque,totalMl})).sort((a,b)=>b.totalMl-a.totalMl);
    const total=lines.reduce((s,l)=>s+l.totalMl,0);
    result[enseigne]={lines,total,nbReleves:g.releves.length,nbMagasins:g.magasins.size,releves:g.releves};
  });
  return result;
}

async function saveModal(){

    if(r){r.enseigne=document.getElementById('mod-enseigne').value;r.centrale=document.getElementById('mod-centrale').value;r.magasin=document.getElementById('mod-magasin').value.trim();}

    await sb.from('releves').update({enseigne:r.enseigne,centrale:r.centrale,magasin:r.magasin}).eq('id',id);
  } else if(type==='centrale'){
    const ens=document.getElementById('mod-cent-enseigne').value;
    const nom=document.getElementById('mod-cent-nom').value.trim();

    centrales.push({id:'c'+Date.now(),enseigne:ens,nom});
    saveLocal();closeModal();renderCentrales();
  } else {
    const marque=document.getElementById('mod-marque').value.trim();
    const ref=document.getElementById('mod-ref').value.trim();
    const longueur=parseFloat(document.getElementById('mod-longueur').value);
    if(!marque||!ref||!longueur){alert('Marque, référence et longueur sont obligatoires.');return;}
    const selectedC=[...document.querySelectorAll('#centrales-picker .centrale-tag.selected')].map(el=>el.getAttribute('data-id')).filter(Boolean);
    const obj={marque,ref,type:document.getElementById('mod-type').value,longueur,hauteur:parseFloat(document.getElementById('mod-hauteur').value)||0,poids:document.getElementById('mod-poids').value.trim(),notes:document.getElementById('mod-notes').value.trim(),centrales:selectedC};
    if(type==='edit-product'){
      const idx=products.findIndex(x=>x.id===id);if(idx>-1)products[idx]={...products[idx],...obj};
      saveLocal();closeModal();renderCatalogue();
      await sb.from('produits').update(obj).eq('id',id);
    } else {
      const newP={id:'p'+Date.now(),...obj};products.push(newP);
      if(type==='product-facing')facings[newP.id]={pid:newP.id,count:0};
      saveLocal();closeModal();
      if(type==='product-facing')renderFacings();else renderCatalogue();
      await sb.from('produits').insert([{id:newP.id,marque:newP.marque,ref:newP.ref,type:newP.type,longueur:newP.longueur,hauteur:newP.hauteur,poids:newP.poids,notes:newP.notes,centrales:newP.centrales||[]}]);
    }
  }
}

// PHOTOS
function initPhotoListener(){
  const photoInput=document.getElementById('photo-input');
  if(!photoInput)return;
  photoInput.addEventListener('change',function(e){
  const files=Array.from(e.target.files);
  if(!files.length)return;
  const remaining=5-photos.length;
  if(remaining<=0){alert('Maximum 5 photos par relevé.');return;}
  const toLoad=files.slice(0,remaining);
  if(files.length>remaining)alert('Seulement '+remaining+' photo(s) ajoutée(s) — maximum 5 atteint.');
  let loaded=0;
  toLoad.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(ev){
      // Redimensionner l'image pour éviter les problèmes de taille
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const maxSize=1200;
        let w=img.width,h=img.height;
        if(w>maxSize||h>maxSize){if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}else{w=Math.round(w*maxSize/h);h=maxSize;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        photos.push(canvas.toDataURL('image/jpeg',0.7));
        loaded++;
        if(loaded===toLoad.length){
          renderPhotoGallery();
          document.getElementById('photo-input').value='';
          if(photos.length>=5)document.getElementById('photo-zone').style.display='none';
          else document.getElementById('photo-zone-text').textContent='Ajouter des photos ('+photos.length+'/5)';
        }
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  });
}

function renderPhotoGallery(){
  const el=document.getElementById('photo-gallery');
  el.innerHTML=photos.map((p,i)=>`<div style="position:relative;width:calc(33% - 4px)"><img src="${p}" style="width:100%;height:80px;object-fit:cover;border-radius:10px;display:block"><button onclick="removePhoto(${i})" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0">✕</button></div>`).join('');
}

function removePhoto(idx){photos.splice(idx,1);renderPhotoGallery();document.getElementById('photo-zone').style.display='block';document.getElementById('photo-zone-text').textContent=photos.length>0?'Ajouter une photo ('+photos.length+'/5)':'Ajouter une photo';}

// FACINGS
function startFacings(){
  const enseigne=document.getElementById('r-enseigne').value;
  const magasin=document.getElementById('r-magasin').value.trim();
  const centrale=document.getElementById('r-centrale').value;
  if(!enseigne||!magasin){alert('Choisir une enseigne et saisir le magasin.');return;}
  const today=new Date().toLocaleDateString('fr-FR');
  if(!editingReleve){
    currentReleve={id:'r'+Date.now(),enseigne,magasin,centrale,type:document.getElementById('r-type').value,date:document.getElementById('r-date').value.trim()||today,facings:{},total:0,results:[]};
    facings={};products.forEach(p=>{facings[p.id]={pid:p.id,count:0};});
    clearPhoto();
  } else {
    currentReleve.enseigne=enseigne;currentReleve.magasin=magasin;currentReleve.centrale=centrale;
    currentReleve.type=document.getElementById('r-type').value;currentReleve.date=document.getElementById('r-date').value.trim()||today;
    facings={};products.forEach(p=>{facings[p.id]={pid:p.id,count:0};});
    (currentReleve.results||[]).forEach(r=>{if(facings[r.pid])facings[r.pid].count=r.count;});
    const localPhotos=localStorage.getItem('rsp_photos_'+currentReleve.id);
    if(localPhotos)photos=JSON.parse(localPhotos);else photos=[];
    renderPhotoGallery();
    if(photos.length>=5)document.getElementById('photo-zone').style.display='none';
    else document.getElementById('photo-zone-text').textContent=photos.length>0?'Ajouter une photo ('+photos.length+'/5)':'Ajouter une photo';
  }
  document.getElementById('facing-title').textContent=enseigne+' — '+magasin;
  // Filtre les refs par centrale
  const centraleObj=centrale?centrales.find(c=>c.nom===centrale&&c.enseigne===enseigne):null;
  const filteredProducts=centraleObj?products.filter(p=>!p.centrales||p.centrales.length===0||p.centrales.includes(centraleObj.id)):products;
  document.getElementById('facing-filter-label').textContent=centrale?'Refs disponibles : '+centrale:'Toutes les références';
  renderFacings(filteredProducts);
  showScreen('screen-facings');
}

function renderFacings(prods){
  prods=prods||products;
  const el=document.getElementById('facing-list');
  el.innerHTML=prods.map((p,i)=>{
    const lon=p.longueur||p.largeur||0;
    const c=facings[p.id]?facings[p.id].count:0;
    return`<div class="facing-row">
      <div class="dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <div class="facing-info"><div class="facing-name">${p.marque}</div><div class="facing-sub">${p.ref} · ${lon}cm</div></div>
      <div class="facing-ctrl">
        <button class="ctrl-btn" onclick="chgFacing('${p.id}',-1)">−</button>
        <span class="facing-count" id="fc-${p.id}">${c}</span>
        <button class="ctrl-btn" onclick="chgFacing('${p.id}',1)">+</button>
      </div>
      <div class="facing-ml" id="fm-${p.id}">${c>0?(c*(lon/100)).toFixed(2)+'m':'—'}</div>
    </div>`;
  }).join('');
}

function chgFacing(pid,delta){
  if(!facings[pid])facings[pid]={pid,count:0};
  facings[pid].count=Math.max(0,facings[pid].count+delta);
  const p=products.find(x=>x.id===pid);const lon=p?(p.longueur||p.largeur||0):0;const c=facings[pid].count;
  const fc=document.getElementById('fc-'+pid);const fm=document.getElementById('fm-'+pid);
  if(fc)fc.textContent=c;
  if(fm)fm.textContent=c>0?(c*(lon/100)).toFixed(2)+'m':'—';
}

async function calcResults(){
  const lines=Object.values(facings).filter(f=>f.count>0).map(f=>{
    const p=products.find(x=>x.id===f.pid);const lon=p?(p.longueur||p.largeur||0):0;
    return{...f,p,ml:f.count*(lon/100)};
  }).sort((a,b)=>b.ml-a.ml);
  if(!lines.length){alert('Saisir au moins un facing.');return;}
  const total=lines.reduce((s,l)=>s+l.ml,0);
  currentReleve.facings=JSON.parse(JSON.stringify(facings));
  currentReleve.results=lines.map(l=>({pid:l.pid,count:l.count,ml:l.ml}));
  currentReleve.total=total;
  // Photos stockées localement uniquement
  if(photos.length>0){
    localStorage.setItem('rsp_photos_'+currentReleve.id,JSON.stringify(photos));
    currentReleve.photos=photos;
  }
  const existing=releves.findIndex(r=>r.id===currentReleve.id);
  // Sauvegarde locale sans photos pour éviter overflow
  const releveForStorage={...currentReleve};
  delete releveForStorage.photos;
  if(existing>-1)releves[existing]=releveForStorage;else releves.push(releveForStorage);
  saveLocal();editingReleve=false;
  document.getElementById('releve-form-title').textContent='Nouveau relevé';
  document.getElementById('releve-submit-btn').innerHTML='<i class="ti ti-arrow-right"></i> Saisir les facings';
  resultFrom='home';renderResults(currentReleve);showScreen('screen-results');
  setSyncStatus('syncing','Sauvegarde…');
  try{
    const payload={id:currentReleve.id,enseigne:currentReleve.enseigne,magasin:currentReleve.magasin,centrale:currentReleve.centrale||null,type:currentReleve.type,date:currentReleve.date,total:currentReleve.total,facings:currentReleve.facings,results:currentReleve.results,user_id:currentUser.id};
    const{error}=await sb.from('releves').upsert([payload]);
    if(error)throw error;setSyncStatus('ok','Synchronisé');
  }catch(e){setSyncStatus('error','Erreur sync');}
}

// PIE
function drawPieOn(canvasId,lines,total){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,200,200);let start=-Math.PI/2;
  lines.forEach((l,i)=>{
    const ml=l.ml||l.totalMl||0;const slice=(ml/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(100,100);ctx.arc(100,100,90,start,start+slice);ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    if(slice>0.2){const mid=start+slice/2;ctx.fillStyle='#fff';ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(((ml/total)*100).toFixed(0)+'%',100+Math.cos(mid)*55,100+Math.sin(mid)*55);}
    start+=slice;
  });
}

  const total=r.total||lines.reduce((s,l)=>s+l.ml,0);
  const nbM=[...new Set(lines.map(l=>l.p.marque))].length;const totF=lines.reduce((s,l)=>s+l.count,0);
  document.getElementById('result-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Linéaire total</div><div class="metric-value">${total.toFixed(2)}<span style="font-size:15px;font-weight:400"> m</span></div><div class="metric-sub">${r.date}${r.centrale?' · '+r.centrale:''}</div></div>
    <div class="metric"><div class="metric-label">Marques</div><div class="metric-value">${nbM}</div><div class="metric-sub">${totF} facings</div></div>`;

      <div class="bar-wrap"><div class="bar-fill" style="width:${(l.ml/maxML*100).toFixed(1)}%;background:${COLORS[i%COLORS.length]}"></div></div>
      <div class="result-pct">${pct.toFixed(1)}%</div>
      <div class="result-ml">${l.ml.toFixed(2)}m</div>
    </div>`;
  }).join('');
}

  const metrics=[{label:'Linéaire total',value:total.toFixed(2)+' m'},{label:'Marques',value:String(nbM)},{label:'Facings',value:String(totF)}];
  const mw=(W-2*M)/3;
  metrics.forEach((m,i)=>{const x=M+i*mw;doc.setFillColor(...LIGHTGRAY);doc.roundedRect(x,y,mw-4,18,2,2,'F');doc.setTextColor(...GRAY);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(m.label,x+4,y+6);doc.setTextColor(...DARK);doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text(m.value,x+4,y+14);});
  y+=26;
  const canvas=document.getElementById('pie-chart');
  if(canvas&&total>0){const imgData=canvas.toDataURL('image/png');const pieSize=55;doc.addImage(imgData,'PNG',(W-pieSize)/2,y,pieSize,pieSize);y+=pieSize+6;}
  doc.setFillColor(...GREEN);doc.rect(M,y,W-2*M,7,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
  doc.text('Marque',M+2,y+5);doc.text('Référence',M+52,y+5);doc.text('Facings',M+112,y+5,{align:'right'});doc.text('ML (m)',M+130,y+5,{align:'right'});doc.text('Part',W-M-2,y+5,{align:'right'});y+=7;
  const maxML=lines.length?Math.max(...lines.map(l=>l.ml)):1;
  lines.forEach((l,i)=>{
    if(y>270){doc.addPage();y=M;}
    const pct=total>0?(l.ml/total*100):0;const color=COLORS[i%COLORS.length];const r2=parseInt(color.slice(1,3),16);const g=parseInt(color.slice(3,5),16);const b=parseInt(color.slice(5,7),16);
    if(i%2===0){doc.setFillColor(248,247,243);doc.rect(M,y,W-2*M,8,'F');}
    doc.setFillColor(r2,g,b);doc.rect(M,y+1,3,6,'F');
    doc.setTextColor(...DARK);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text((l.p.marque||'?').substring(0,22),M+5,y+5);
    doc.setFont('helvetica','normal');doc.setTextColor(...GRAY);doc.text((l.p.ref||'?').substring(0,28),M+52,y+5);
    doc.setTextColor(...DARK);doc.text(String(l.count),M+112,y+5,{align:'right'});doc.text(l.ml.toFixed(2),M+130,y+5,{align:'right'});
    doc.setFont('helvetica','bold');doc.text(pct.toFixed(1)+'%',W-M-2,y+5,{align:'right'});y+=8;
  });
  doc.setFillColor(...LIGHTGRAY);doc.rect(M,y,W-2*M,8,'F');
  doc.setFont('helvetica','bold');doc.setTextColor(...DARK);doc.setFontSize(8);doc.text('TOTAL',M+5,y+5);doc.text(String(totF),M+112,y+5,{align:'right'});doc.text(total.toFixed(2),M+130,y+5,{align:'right'});doc.text('100%',W-M-2,y+5,{align:'right'});
  doc.save('releve_'+currentReleve.enseigne+'_'+currentReleve.magasin+'_'+currentReleve.date.replace(/\//g,'-')+'.pdf');
}

// INIT
document.getElementById('r-date').value=new Date().toLocaleDateString('fr-FR');
init();
</script>
